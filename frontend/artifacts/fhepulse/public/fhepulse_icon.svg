<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="300" y1="210" x2="730" y2="810" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DE2E6"/>
      <stop offset="52%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B3DFF"/>
    </linearGradient>

    <linearGradient id="orbitGrad" x1="140" y1="560" x2="890" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27E6F5"/>
      <stop offset="55%" stop-color="#9D7BFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="lockBodyGrad" x1="430" y1="500" x2="610" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="shieldClip">
      <path d="M512 170
               C590 214 679 236 762 255
               V472
               C762 640 640 769 512 852
               C384 769 262 640 262 472
               V255
               C345 236 434 214 512 170Z"/>
    </clipPath>
  </defs>

  <!-- Orbit behind -->
  <g filter="url(#softGlow)" opacity="0.98">
    <path d="M165 595
             C270 515 425 490 595 503
             C731 514 832 556 889 601"
          stroke="url(#orbitGrad)" stroke-width="34" stroke-linecap="round"/>
  </g>

  <!-- Shield -->
  <g filter="url(#shadow)">
    <path d="M512 170
             C590 214 679 236 762 255
             V472
             C762 640 640 769 512 852
             C384 769 262 640 262 472
             V255
             C345 236 434 214 512 170Z"
          fill="url(#shieldGrad)"/>

    <!-- center seam -->
    <path d="M512 190V832" stroke="white" stroke-opacity="0.12" stroke-width="6"/>

    <!-- top highlight -->
    <path d="M300 255C390 228 454 207 512 180C576 209 645 231 724 250"
          stroke="white" stroke-opacity="0.35" stroke-width="6" stroke-linecap="round"/>

    <!-- Bars inside shield -->
    <g clip-path="url(#shieldClip)">
      <rect x="365" y="450" width="70" height="175" rx="8" fill="#0B1D4D" opacity="0.98"/>
      <rect x="470" y="365" width="70" height="260" rx="8" fill="#0B1D4D" opacity="0.98"/>
      <rect x="575" y="410" width="70" height="215" rx="8" fill="#0B1D4D" opacity="0.98"/>

      <rect x="365" y="450" width="70" height="16" rx="8" fill="#17346B" opacity="0.65"/>
      <rect x="470" y="365" width="70" height="16" rx="8" fill="#17346B" opacity="0.65"/>
      <rect x="575" y="410" width="70" height="16" rx="8" fill="#17346B" opacity="0.65"/>
    </g>
  </g>

  <!-- Lock -->
  <g filter="url(#shadow)">
    <!-- shackle -->
    <path d="M451 526
             V486
             C451 435 489 397 539 397
             C589 397 627 435 627 486
             V526"
          stroke="#E5E7EB" stroke-width="22" stroke-linecap="round"/>
    <path d="M451 526
             V486
             C451 435 489 397 539 397
             C589 397 627 435 627 486
             V526"
          stroke="url(#lockBodyGrad)" stroke-opacity="0.45" stroke-width="12" stroke-linecap="round"/>

    <!-- body -->
    <rect x="418" y="505" width="242" height="185" rx="36" fill="url(#lockBodyGrad)"/>
    <rect x="425" y="512" width="228" height="171" rx="30" stroke="white" stroke-opacity="0.18" stroke-width="3"/>

    <!-- keyhole -->
    <path d="M539 562
             C507 562 483 585 483 614
             C483 634 495 650 513 659
             L503 717
             H575
             L565 659
             C583 650 595 634 595 614
             C595 585 571 562 539 562Z"
          fill="#0B0F1A"/>
    <rect x="529" y="586" width="20" height="90" rx="10" fill="#0B0F1A"/>
  </g>

  <!-- Orbit in front -->
  <g filter="url(#softGlow)">
    <path d="M160 595
             C235 670 360 714 512 714
             C648 714 773 658 853 571"
          stroke="url(#orbitGrad)" stroke-width="34" stroke-linecap="round"/>
  </g>

  <!-- Small glints -->
  <g filter="url(#softGlow)">
    <g transform="translate(240 585)">
      <path d="M0 -18L4 -4L18 0L4 4L0 18L-4 4L-18 0L-4 -4Z" fill="url(#shineGrad)"/>
    </g>
    <g transform="translate(785 330)">
      <path d="M0 -18L4 -4L18 0L4 4L0 18L-4 4L-18 0L-4 -4Z" fill="url(#shineGrad)"/>
    </g>
  </g>
</svg>
