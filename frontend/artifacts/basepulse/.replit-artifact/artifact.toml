kind = "web"
previewPath = "/"
title = "BasePulse - Decentralized Polls & Surveys"
version = "1.0.0"
id = "artifacts/basepulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20803

[services.development]
run = "pnpm --filter @workspace/basepulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/basepulse", "run", "build" ]
publicDir = "artifacts/basepulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20803"
BASE_PATH = "/"
